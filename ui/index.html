<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Box</title>
<style>
/* ============================================================
   AIBox — Design System (from AIBox-Design/css/aibox.css)
   navy #0B1F3A + electric blue #1E6FD9 · Space Grotesk + IBM Plex
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root {
  --navy-900:#0B1F3A; --navy-800:#122B4D; --navy-700:#1B3A63; --navy-600:#2A4D7C;
  --blue-700:#1751A8; --blue-600:#1E6FD9; --blue-500:#3A86E8; --blue-100:#DCE9FC; --blue-50:#EEF4FE;
  --ink-900:#0B1F3A; --ink-700:#2E3D52; --ink-500:#5A6B82; --ink-400:#8693A6; --ink-300:#AAB4C2;
  --line-200:#E5E9EF; --line-100:#EEF1F5;
  --canvas:#F6F8FB; --surface:#FFFFFF; --surface-2:#FBFCFE;
  --amber-600:#B7791F; --amber-100:#FBEBCF; --amber-50:#FDF6E9;
  --green-700:#1B7A4B; --green-100:#D6F0E0; --green-50:#ECF8F1;
  --red-600:#C0392B; --red-50:#FCEEEC; --purple-600:#6D4AB8; --purple-50:#F1ECFB;
  --cl-public:#5A6B82; --cl-internal:#1E6FD9; --cl-confidential:#B7791F; --cl-restricted:#C0392B; --cl-board:#6D4AB8;
  --r-xs:6px; --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:22px; --r-pill:999px;
  --sh-xs:0 1px 2px rgba(11,31,58,.06);
  --sh-sm:0 1px 3px rgba(11,31,58,.08), 0 1px 2px rgba(11,31,58,.04);
  --sh-md:0 4px 16px rgba(11,31,58,.08), 0 1px 3px rgba(11,31,58,.05);
  --sh-lg:0 16px 40px rgba(11,31,58,.12), 0 4px 12px rgba(11,31,58,.06);
  --sh-focus:0 0 0 3px rgba(30,111,217,.18);
  --font-ui:'IBM Plex Sans', system-ui, -apple-system, sans-serif;
  --font-display:'Space Grotesk', 'IBM Plex Sans', sans-serif;
  --font-mono:'IBM Plex Mono', ui-monospace, monospace;
  --topbar-h:64px; --rail-w:248px;
}
* { box-sizing:border-box; }
html, body { margin:0; padding:0; }
body { font-family:var(--font-ui); color:var(--ink-700); background:var(--canvas); -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; font-size:15px; line-height:1.5; }
button { font-family:inherit; cursor:pointer; }
input, textarea, select { font-family:inherit; }
::selection { background:var(--blue-100); color:var(--navy-900); }
*::-webkit-scrollbar { width:10px; height:10px; }
*::-webkit-scrollbar-thumb { background:#D4DAE3; border-radius:999px; border:3px solid transparent; background-clip:padding-box; }
*::-webkit-scrollbar-thumb:hover { background:#BCC4D0; background-clip:padding-box; }
*::-webkit-scrollbar-track { background:transparent; }

.h-display { font-family:var(--font-display); font-weight:600; color:var(--ink-900); letter-spacing:-0.02em; line-height:1.1; }
.h1 { font-family:var(--font-display); font-weight:600; font-size:30px; letter-spacing:-0.02em; color:var(--ink-900); line-height:1.15; }
.h2 { font-family:var(--font-display); font-weight:600; font-size:22px; letter-spacing:-0.01em; color:var(--ink-900); line-height:1.2; }
.h3 { font-weight:600; font-size:17px; color:var(--ink-900); letter-spacing:-0.01em; }
.lbl { font-size:11px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:var(--ink-400); }
.mono { font-family:var(--font-mono); }
.muted { color:var(--ink-500); }
.dim { color:var(--ink-400); }

.app { display:grid; grid-template-columns:var(--rail-w) minmax(0,1fr); height:100vh; overflow:hidden; }
.rail { background:var(--surface); border-right:1px solid var(--line-200); display:flex; flex-direction:column; height:100vh; overflow:hidden; }
.rail-logo { display:flex; align-items:center; gap:11px; padding:18px 20px 16px; }
.rail-logo .mark { width:34px; height:34px; border-radius:9px; flex:0 0 auto; box-shadow:var(--sh-xs); }
.rail-logo .wordmark { font-family:var(--font-display); font-weight:600; font-size:19px; color:var(--navy-900); letter-spacing:-0.01em; }
.rail-logo .wordmark b { color:var(--blue-600); font-weight:600; }
.rail-nav { padding:6px 12px; display:flex; flex-direction:column; gap:2px; overflow-y:auto; flex:1; }
.nav-section { margin-top:16px; padding:4px 10px 6px; }
.nav-item { display:flex; align-items:center; gap:11px; padding:9px 11px; border-radius:var(--r-sm); color:var(--ink-500); font-weight:500; font-size:14.5px; border:none; background:none; text-align:left; width:100%; transition:background .12s, color .12s; }
.nav-item svg { width:19px; height:19px; flex:0 0 auto; }
.nav-item:hover { background:var(--line-100); color:var(--ink-900); }
.nav-item.active { background:var(--blue-50); color:var(--blue-700); font-weight:600; }
.nav-item.active svg { color:var(--blue-600); }
.nav-item .count { margin-left:auto; font-size:11.5px; font-weight:600; background:var(--line-100); color:var(--ink-500); padding:1px 7px; border-radius:var(--r-pill); }
.nav-item.active .count { background:var(--blue-100); color:var(--blue-700); }
.nav-item .dot { margin-left:auto; width:7px; height:7px; border-radius:50%; background:var(--blue-600); }
.rail-foot { border-top:1px solid var(--line-200); padding:12px; }

.main { display:flex; flex-direction:column; height:100vh; overflow:hidden; }
.topbar { height:var(--topbar-h); flex:0 0 auto; background:rgba(255,255,255,.86); backdrop-filter:saturate(1.4) blur(8px); border-bottom:1px solid var(--line-200); display:flex; align-items:center; gap:16px; padding:0 24px; z-index:20; }
.content { flex:1; overflow-y:auto; }
.content-pad { padding:30px 36px 60px; max-width:1240px; margin:0 auto; }

.btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; height:38px; padding:0 16px; border-radius:var(--r-sm); font-weight:600; font-size:14px; border:1px solid transparent; transition:background .14s, box-shadow .14s, border-color .14s, transform .05s; white-space:nowrap; }
.btn:active { transform:translateY(.5px); }
.btn svg { width:17px; height:17px; }
.btn-primary { background:var(--blue-600); color:#fff; box-shadow:var(--sh-xs); }
.btn-primary:hover { background:var(--blue-700); }
.btn-ghost { background:var(--surface); color:var(--ink-700); border-color:var(--line-200); }
.btn-ghost:hover { background:var(--line-100); border-color:#D8DEE7; }
.btn-quiet { background:transparent; color:var(--ink-500); }
.btn-quiet:hover { background:var(--line-100); color:var(--ink-900); }
.btn-amber { background:var(--amber-600); color:#fff; }
.btn-amber:hover { background:#9c660f; }
.btn-danger { background:var(--surface); color:var(--red-600); border-color:#EAC7C2; }
.btn-danger:hover { background:var(--red-50); }
.btn-sm { height:32px; padding:0 12px; font-size:13px; }
.btn-lg { height:44px; padding:0 22px; font-size:15px; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-block { width:100%; }
.icon-btn { width:38px; height:38px; border-radius:var(--r-sm); display:inline-flex; align-items:center; justify-content:center; background:var(--surface); border:1px solid var(--line-200); color:var(--ink-500); transition:background .12s, color .12s, border-color .12s; }
.icon-btn:hover { background:var(--line-100); color:var(--ink-900); }
.icon-btn svg { width:18px; height:18px; }

.field { display:flex; flex-direction:column; gap:7px; }
.field > label { font-size:13px; font-weight:600; color:var(--ink-700); }
.field .hint { font-size:12.5px; color:var(--ink-400); }
.input, .select, .textarea { width:100%; border:1px solid var(--line-200); background:var(--surface); border-radius:var(--r-sm); padding:10px 13px; font-size:14px; color:var(--ink-900); transition:border-color .14s, box-shadow .14s; }
.input::placeholder, .textarea::placeholder { color:var(--ink-400); }
.input:focus, .select:focus, .textarea:focus { outline:none; border-color:var(--blue-500); box-shadow:var(--sh-focus); }
.textarea { resize:vertical; min-height:84px; line-height:1.5; }
.search-box { position:relative; display:flex; align-items:center; }
.search-box svg.lead { position:absolute; left:14px; width:18px; height:18px; color:var(--ink-400); pointer-events:none; }
.search-box input { padding-left:42px; height:42px; }

.card { background:var(--surface); border:1px solid var(--line-200); border-radius:var(--r-md); }
.card-pad { padding:20px; }
.card-hover { transition:box-shadow .16s, border-color .16s, transform .16s; }
.card-hover:hover { box-shadow:var(--sh-md); border-color:#D8DEE7; }
.panel { background:var(--surface); border:1px solid var(--line-200); border-radius:var(--r-lg); }

.badge { display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; padding:3px 9px; border-radius:var(--r-pill); background:var(--line-100); color:var(--ink-500); white-space:nowrap; line-height:1.4; }
.badge svg { width:12px; height:12px; }
.badge.blue { background:var(--blue-50); color:var(--blue-700); }
.badge.amber { background:var(--amber-50); color:var(--amber-600); }
.badge.green { background:var(--green-50); color:var(--green-700); }
.badge.red { background:var(--red-50); color:var(--red-600); }
.badge.purple { background:var(--purple-50); color:var(--purple-600); }
.badge.solid-blue { background:var(--blue-600); color:#fff; }
.badge.outline { background:transparent; border:1px solid var(--line-200); color:var(--ink-500); }
.attr { display:inline-flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:12px; font-weight:500; padding:3px 9px; border-radius:var(--r-xs); background:var(--surface-2); border:1px solid var(--line-200); color:var(--ink-700); }
.attr .k { color:var(--ink-400); }
.attr.blue { background:var(--blue-50); border-color:var(--blue-100); color:var(--blue-700); }
.clr { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:3px 9px 3px 8px; border-radius:var(--r-pill); }
.clr .ico { width:7px; height:7px; border-radius:50%; }
.clr-public { background:#EEF1F5; color:var(--cl-public); } .clr-public .ico { background:var(--cl-public); }
.clr-internal { background:var(--blue-50); color:var(--cl-internal); } .clr-internal .ico { background:var(--cl-internal); }
.clr-confidential { background:var(--amber-50); color:var(--cl-confidential); } .clr-confidential .ico { background:var(--cl-confidential); }
.clr-restricted { background:var(--red-50); color:var(--cl-restricted); } .clr-restricted .ico { background:var(--cl-restricted); }
.clr-board { background:var(--purple-50); color:var(--cl-board); } .clr-board .ico { background:var(--cl-board); }
.avatar { border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-weight:600; color:#fff; flex:0 0 auto; font-size:13px; letter-spacing:.01em; }
.ftype { width:38px; height:38px; border-radius:9px; display:inline-flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:10px; font-weight:600; color:#fff; flex:0 0 auto; letter-spacing:.02em; }
kbd { font-family:var(--font-mono); font-size:11px; background:var(--surface); border:1px solid var(--line-200); border-bottom-width:2px; border-radius:5px; padding:1px 5px; color:var(--ink-500); }
.seg { display:inline-flex; background:var(--line-100); border-radius:var(--r-sm); padding:3px; gap:2px; }
.seg button { border:none; background:none; padding:6px 13px; border-radius:6px; font-size:13px; font-weight:600; color:var(--ink-500); transition:all .12s; }
.seg button.on { background:var(--surface); color:var(--navy-900); box-shadow:var(--sh-xs); }
.seg button:hover:not(.on) { color:var(--ink-900); }
.hr { height:1px; background:var(--line-200); border:none; margin:0; }
.vr { width:1px; align-self:stretch; background:var(--line-200); }
.row { display:flex; align-items:center; gap:10px; }
.col { display:flex; flex-direction:column; }
.spread { display:flex; align-items:center; justify-content:space-between; gap:12px; }
.wrap { flex-wrap:wrap; }
.grow { flex:1; }
.gap6{gap:6px;} .gap8{gap:8px;} .gap12{gap:12px;} .gap16{gap:16px;} .gap20{gap:20px;} .gap24{gap:24px;}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.fade-up { opacity:1; animation:fadeUp .32s cubic-bezier(.2,.7,.3,1); }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.fade-in { opacity:1; animation:fadeIn .3s ease; }
@media (prefers-reduced-motion: reduce) { .fade-up, .fade-in { animation:none; } }
@keyframes popIn { from { opacity:0; transform:scale(.97); } to { opacity:1; transform:none; } }
.scrim { position:fixed; inset:0; background:rgba(11,31,58,.42); backdrop-filter:blur(2px); display:flex; align-items:center; justify-content:center; z-index:100; animation:fadeIn .18s ease both; padding:24px; }
.modal { background:var(--surface); border-radius:var(--r-lg); box-shadow:var(--sh-lg); width:100%; max-width:540px; max-height:88vh; overflow:hidden; display:flex; flex-direction:column; animation:popIn .22s cubic-bezier(.2,.8,.3,1) both; }
.modal-head { padding:20px 24px; border-bottom:1px solid var(--line-200); }
.modal-body { padding:24px; overflow-y:auto; }
.modal-foot { padding:16px 24px; border-top:1px solid var(--line-200); display:flex; justify-content:flex-end; gap:10px; background:var(--surface-2); }
.toast-wrap { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:10px; align-items:center; }
.toast { background:var(--navy-900); color:#fff; padding:12px 18px; border-radius:var(--r-md); box-shadow:var(--sh-lg); display:flex; align-items:center; gap:11px; font-size:14px; font-weight:500; animation:popIn .2s ease both; }
.toast svg { width:18px; height:18px; }
.toast .ok { color:#5BD68C; }
.bar { height:6px; background:var(--line-100); border-radius:999px; overflow:hidden; }
.bar > i { display:block; height:100%; background:var(--blue-600); border-radius:999px; transition:width .4s ease; }
.lock-grid { background-image:linear-gradient(var(--line-200) 1px, transparent 1px), linear-gradient(90deg, var(--line-200) 1px, transparent 1px); background-size:22px 22px; }
.persona-card { display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:var(--r-sm); border:1px solid var(--line-200); background:var(--surface); transition:background .12s, border-color .12s; }
.persona-card:hover { background:var(--line-100); }
.tabs { display:flex; gap:4px; border-bottom:1px solid var(--line-200); }
.tab { padding:11px 14px; font-size:14px; font-weight:600; color:var(--ink-500); border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .12s, border-color .12s; }
.tab:hover { color:var(--ink-900); }
.tab.on { color:var(--blue-700); border-bottom-color:var(--blue-600); }
.tbl { width:100%; border-collapse:collapse; font-size:13.5px; }
.tbl th { text-align:left; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-400); padding:10px 14px; border-bottom:1px solid var(--line-200); white-space:nowrap; }
.tbl td { padding:12px 14px; border-bottom:1px solid var(--line-100); color:var(--ink-700); vertical-align:middle; }
.tbl tr:last-child td { border-bottom:none; }
.tbl tbody tr { transition:background .1s; }
.tbl tbody tr:hover { background:var(--surface-2); }
.cite-chip { display:inline-flex; align-items:center; justify-content:center; min-width:17px; height:17px; padding:0 4px; margin:0 1px; vertical-align:2px; font-family:var(--font-mono); font-size:10.5px; font-weight:700; border-radius:5px; border:1px solid var(--blue-100); background:var(--blue-50); color:var(--blue-700); cursor:pointer; transition:background .12s, transform .08s, box-shadow .12s; line-height:1; }
.cite-chip:hover { background:var(--blue-100); }
.cite-chip[data-on="true"] { background:var(--blue-600); color:#fff; border-color:var(--blue-600); box-shadow:var(--sh-focus); }
.think-dot { width:7px; height:7px; border-radius:50%; background:var(--blue-500); display:inline-block; animation:thinkPulse 1s ease-in-out infinite; }
@keyframes thinkPulse { 0%, 100% { opacity:.25; transform:translateY(0); } 40% { opacity:1; transform:translateY(-3px); } }
@keyframes slideInRight { from { transform:translateX(28px); opacity:.4; } to { transform:none; opacity:1; } }
mark, .src-mark { background:var(--amber-100); color:var(--ink-900); border-radius:3px; padding:0 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, createContext, useContext } = React;

/* ============================================================
   API client — every call carries the JWT bearer token (set at login)
   ============================================================ */
let TOKEN = localStorage.getItem('aibox_token') || '';
let onAuthFail = () => {};   // set by <Root> to drop back to the login screen on 401
function setToken(t){ TOKEN = t; if(t) localStorage.setItem('aibox_token', t); else localStorage.removeItem('aibox_token'); }
const authHeader = () => TOKEN ? {'Authorization':'Bearer '+TOKEN} : {};
const api = (p, opt={}) => fetch('/api'+p, {
  ...opt,
  headers:{ ...authHeader(),
    ...(opt.body && !(opt.body instanceof FormData) ? {'Content-Type':'application/json'} : {}),
    ...(opt.headers||{}) }
}).then(async r => {
  if(r.status === 401){ setToken(''); onAuthFail(); throw new Error('Session expired'); }
  if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || r.status);
  return r.json();
});

// View/download a file with the bearer token attached (a bare link would drop the auth header).
async function _open(url, download, onErr){
  const win = download ? null : window.open('about:blank','_blank');
  try{
    const r = await fetch(url, {headers:authHeader()});
    if(!r.ok){ if(win) win.close(); onErr && onErr(`Cannot open document (${r.status})`); return; }
    const blobUrl = URL.createObjectURL(await r.blob());
    if(download){
      const fn = ((r.headers.get('Content-Disposition')||'').match(/filename="([^"]+)"/)||[])[1] || 'document';
      const a = document.createElement('a'); a.href=blobUrl; a.download=fn; document.body.appendChild(a); a.click(); a.remove();
    } else { win.location = blobUrl; }
    setTimeout(()=>URL.revokeObjectURL(blobUrl), 60000);
  }catch(e){ if(win) win.close(); onErr && onErr('Open failed: '+e.message); }
}
function openFile(id, download, onErr){ return _open(`/api/documents/${id}/file${download?'?download=1':''}`, download, onErr); }
function openVersionFile(id, versionNo, onErr){ return _open(`/api/documents/${id}/versions/${versionNo}/file?download=1`, true, onErr); }

const FILE_COLORS = { pdf:'#C0392B', docx:'#2A5FB8', pptx:'#C2591F', xlsx:'#1B7A4B', csv:'#1B7A4B', txt:'#5A6B82', md:'#5A6B82', png:'#6D4AB8', code:'#0B1F3A' };
const AV_COLORS = ['#1E6FD9','#6D4AB8','#1B7A4B','#B7791F','#C0392B','#2A4D7C','#2B8AA6','#A8497F'];
function avColor(name){ let h=0; for(const c of (name||'')) h=(h*31+c.charCodeAt(0))%AV_COLORS.length; return AV_COLORS[h]; }
function initials(name){ return (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function extOf(name){ const e=((name||'').toLowerCase().split('.').pop()||''); return FILE_COLORS[e]?e:'doc'; }   // safe glyph type when no extension
function relTime(ts){ // epoch seconds -> "x ago"
  if(!ts) return '';
  const s = Math.max(1, Math.floor(Date.now()/1000 - ts));
  if(s<60) return 'just now'; const m=Math.floor(s/60); if(m<60) return m+' min ago';
  const h=Math.floor(m/60); if(h<24) return h+' hour'+(h>1?'s':'')+' ago';
  const d=Math.floor(h/24); if(d<30) return d+' day'+(d>1?'s':'')+' ago';
  return new Date(ts*1000).toLocaleDateString();
}

/* ============================================================
   Icons (Lucide-style)
   ============================================================ */
const ICONS = {
  search:'M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM21 21l-4.3-4.3',
  library:'M3 5h18M3 12h18M3 19h18',
  grid:'M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z',
  chat:'M21 11.5a8.5 8.5 0 0 1-12.5 7.5L3 21l2-5.5A8.5 8.5 0 1 1 21 11.5Z',
  upload:'M12 16V4M7 9l5-5 5 5M5 20h14',
  doc:'M14 3v5h5M7 3h8l5 5v12a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z',
  lock:'M6 11h12a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-8a1 1 0 0 1 1-1ZM8 11V7a4 4 0 0 1 8 0v4',

function Icon({ name, size=20, className='', style={}, strokeWidth=2 }) {
  const d = ICONS[name]; if(!d) return null;
  const fill = ['grid'].includes(name);
  return (
    <svg className={className} width={size} height={size} viewBox="0 0 24 24"
      fill={fill?'currentColor':'none'} stroke={fill?'none':'currentColor'}
      strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
      {d.split('M').filter(Boolean).map((seg,i)=><path key={i} d={'M'+seg} />)}
    </svg>
  );
}
function LogoMark({ size=34 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 512 512" className="mark" style={{ borderRadius:size*0.26 }}>
      <rect width="512" height="512" rx="112" fill="#0B1F3A" />
      <rect x="96" y="96" width="144" height="144" rx="20" fill="#1E6FD9" />
      <rect x="272" y="96" width="144" height="144" rx="20" fill="#1E6FD9" opacity="0.45" />
      <rect x="96" y="272" width="144" height="144" rx="20" fill="#1E6FD9" opacity="0.45" />
      <rect x="272" y="272" width="144" height="144" rx="20" fill="#1E6FD9" opacity="0.20" />
      <circle cx="368" cy="368" r="52" fill="#1E6FD9" />

}
function Avatar({ name, size=32 }) {
  return <span className="avatar" style={{ width:size, height:size, background:avColor(name), fontSize:size*0.4 }}>{initials(name)}</span>;
}
function FileGlyph({ type, size=38 }) {
  const t = (type||'txt').toLowerCase(); const color = FILE_COLORS[t] || FILE_COLORS.txt;
  return <span className="ftype" style={{ width:size, height:size, background:color, borderRadius:size*0.24 }}>{t.toUpperCase()}</span>;
}
function Clearance({ level, size }) {
  const cls = 'clr-' + ({ 'Public':'public','Internal':'internal','Confidential':'confidential','Restricted':'restricted','Board-Only':'board' }[level] || 'public');
  return <span className={'clr '+cls} style={size==='sm'?{fontSize:11,padding:'2px 8px'}:{}}><span className="ico" />{level}</span>;
}
function Attr({ k, v, blue }) { return <span className={'attr'+(blue?' blue':'')}>{k && <span className="k">{k}:</span>}{v}</span>; }

const ToastCtx = createContext(()=>{});
function useToast(){ return useContext(ToastCtx); }
function ToastHost({ children }) {
  const [toasts, setToasts] = useState([]);
  const push = (msg, opts={}) => { const id = Math.random(); setToasts(t=>[...t,{id,msg,...opts}]); setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), opts.duration||3200); };
  return (
    <ToastCtx.Provider value={push}>
      {children}
      <div className="toast-wrap">
        {toasts.map(t=>(
          <div className="toast" key={t.id}>
            <Icon name={t.icon||'checkCircle'} size={18} className={t.danger?'':'ok'} style={t.danger?{color:'#F5897E'}:{}} />
            <span>{t.msg}</span>
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
function Modal({ children, onClose, width=540 }) {
  useEffect(()=>{ const h=e=>{ if(e.key==='Escape') onClose && onClose(); }; window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h); }, []);
  return (
    <div className="scrim" onMouseDown={onClose}>
      <div className="modal" style={{ maxWidth:width }} onMouseDown={e=>e.stopPropagation()}>{children}</div>
    </div>
  );
}
function Menu({ trigger, children, align='left', width=220 }) {
  const [open, setOpen] = useState(false); const ref = useRef();
  useEffect(()=>{ const h=e=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); }; document.addEventListener('mousedown',h); return ()=>document.removeEventListener('mousedown',h); }, []);
  return (
    <div ref={ref} style={{ position:'relative' }}>
      <div onClick={()=>setOpen(o=>!o)}>{trigger(open)}</div>
      {open && (
        <div style={{ position:'absolute', top:'calc(100% + 6px)', [align]:0, width, background:'#fff', border:'1px solid var(--line-200)', borderRadius:'var(--r-md)', boxShadow:'var(--sh-lg)', padding:6, zIndex:50, animation:'popIn .15s ease both' }}>
          {typeof children==='function' ? children(()=>setOpen(false)) : children}
        </div>
      )}
    </div>
  );
}
function MenuItem({ icon, children, onClick, danger }) {
  return <button className="nav-item" onClick={onClick} style={{ padding:'8px 10px', color:danger?'var(--red-600)':undefined }}>{icon && <Icon name={icon} size={17} />}<span style={{ fontSize:14 }}>{children}</span></button>;
}
function Hint({ icon, children }) {
  return <div className="row" style={{ gap:8, color:'var(--ink-400)', fontSize:13 }}><Icon name={icon||'info'} size={15} /><span>{children}</span></div>;
}
function Spinner({ label }) {
  return <div className="row" style={{ gap:9, padding:'40px 0', justifyContent:'center', color:'var(--ink-400)' }}>{[0,1,2].map(i=><span key={i} className="think-dot" style={{ animationDelay:i*0.16+'s' }} />)}{label && <span className="dim" style={{ fontSize:13, marginLeft:6 }}>{label}</span>}</div>;
}

/* Access chips for a REAL document (group-based ACL, server-side) */
function AccessChips({ d, me }) {
  const mine = d.owner_id === (me && me.id);
  const groups = (d.shared_with||'').split(',').map(s=>s.trim()).filter(Boolean);
  return (
    <div className="row wrap" style={{ gap:6 }}>
      {mine && <span className="badge green"><Icon name="user" size={11} />Owned by you</span>}
      {groups.length ? groups.map(g=><span key={g} className="badge blue"><Icon name="users" size={11} />{g}</span>)
                     : <span className="badge amber"><Icon name="lock" size={11} />Private (owner-only)</span>}
    </div>
  );
}

   SEARCH (real: POST /api/search)
   ============================================================ */
function FacetGroup({ title, icon, items, sel, onToggle, clearance }) {
  if(!items || !items.length) return null;
  return (
    <div className="col" style={{ gap:9 }}>
      <div className="row" style={{ gap:7, color:'var(--ink-400)' }}><Icon name={icon} size={15} /><span className="lbl" style={{ color:'var(--ink-500)' }}>{title}</span></div>
      <div className="col" style={{ gap:1 }}>
        {items.map(([label,count])=>{ const on = sel.includes(label); return (
          <button key={label} onClick={()=>onToggle(label)} className="row" style={{ gap:9, padding:'6px 8px', borderRadius:7, border:'none', background:on?'var(--blue-50)':'transparent', cursor:'pointer', textAlign:'left', width:'100%' }}>
            <span style={{ width:15, height:15, borderRadius:4, border:'1.5px solid '+(on?'var(--blue-600)':'var(--line-200)'), background:on?'var(--blue-600)':'#fff', display:'grid', placeItems:'center', flex:'0 0 auto' }}>{on && <Icon name="check" size={11} style={{ color:'#fff' }} strokeWidth={3} />}</span>
            {clearance ? <span className="grow"><Clearance level={label} size="sm" /></span>
              : <span className="grow" style={{ fontSize:13.5, color:on?'var(--blue-700)':'var(--ink-700)', textTransform:title==='Document type'?'uppercase':'none', fontWeight:on?600:500 }}>{label}</span>}
            <span className="dim mono" style={{ fontSize:12 }}>{count}</span>
          </button>
        ); })}
      </div>
    </div>
  );
}
function ScreenSearch({ go, me }) {

  const inputRef = useRef();
  useEffect(()=>{ inputRef.current && inputRef.current.focus(); }, []);

  const run = async (query, f) => {
    query = (query ?? q).trim(); if(!query) return;
    setBusy(true);
    try {
      const r = await api('/search',{method:'POST',body:JSON.stringify({q:query, filters:f||filters})});
      setRes(r); setSelected(new Set(r.results.map(x=>x.doc_id)));
    } catch(e){ toast('Search failed: '+e.message, {danger:true, icon:'xCircle'}); }
    setBusy(false);
  };
  const toggleFacet = (group, val) => {
    const cur = filters[group]||[];
    const next = { ...filters, [group]: cur.includes(val) ? cur.filter(x=>x!==val) : [...cur, val] };
    setFilters(next); run(q, next);
  };
  const toggleSel = (id) => setSelected(s=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });

  const results = res ? res.results : [];
  const restricted = res ? res.restricted : [];
  const facets = res ? res.facets : { type:[], department:[], clearance:[] };

    <div className="content-pad fade-up">
      <div style={{ marginBottom:22 }}>

      </div>

      <div className="row" style={{ gap:12, marginBottom:8 }}>
        <div className="search-box grow">
          <Icon name="search" className="lead" />
          <input ref={inputRef} className="input" value={q} onChange={e=>setQ(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter') run(); }}
            placeholder="Search documents, ask a question, or paste a reference…" />
        </div>
        <span className="badge" title="Full-text keyword retrieval (SQLite FTS5, BM25 ranking)" style={{ padding:'0 12px', height:42, fontSize:12.5 }}><Icon name="zap" size={13} />Keyword · BM25</span>
        <button className="btn btn-primary btn-lg" onClick={()=>run()} disabled={busy}><Icon name="search" size={17} />Search</button>
      </div>
      <div className="row wrap" style={{ gap:14, marginBottom:24, paddingLeft:2 }}>
        <Hint icon="zap">FTS5 · BM25 ranking</Hint><span className="dim">·</span>
        <Hint icon="shieldCheck">ABAC-filtered at retrieval (clearance · department · type · project)</Hint>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'240px minmax(0,1fr)', gap:28, alignItems:'start' }}>
        <aside className="col" style={{ gap:22, position:'sticky', top:12 }}>
          {res && (results.length>0) && <>
            <FacetGroup title="Document type" icon="file" items={facets.type} sel={filters.type} onToggle={v=>toggleFacet('type',v)} />
            <FacetGroup title="Department" icon="building" items={facets.department} sel={filters.department} onToggle={v=>toggleFacet('department',v)} />
            <FacetGroup title="Clearance" icon="shield" items={facets.clearance} sel={filters.clearance} onToggle={v=>toggleFacet('clearance',v)} clearance />
          </>}
          {res && <div className="card card-pad">
            <div className="lbl" style={{ marginBottom:10 }}>This search</div>
            <div className="col" style={{ gap:8 }}>
              <div className="spread"><span className="row" style={{ gap:6, fontSize:13 }}><Icon name="doc" size={14} style={{ color:'var(--ink-400)' }} />Accessible</span><span className="badge green">{results.length}</span></div>
              <div className="spread"><span className="row" style={{ gap:6, fontSize:13 }}><Icon name="lock" size={14} style={{ color:'var(--ink-400)' }} />Restricted</span><span className="badge amber">{restricted.length}</span></div>
            </div>
          </div>}
          <div className="card card-pad" style={{ background:'var(--surface-2)' }}>
            <Hint icon="info">Facet counts exclude documents outside your access — restricted docs never inflate counts.</Hint>
          </div>
        </aside>

              <div className="h3" style={{ marginBottom:6 }}>Search your accessible corpus</div>
              <p className="dim" style={{ margin:0, fontSize:13.5 }}>Try a topic, a phrase, or a question. Documents outside your access appear as redacted, request-to-unlock cards.</p>
            </div>

          {res && <>
            <div className="spread" style={{ marginBottom:2 }}>

                <span style={{ fontWeight:600, color:'var(--ink-900)' }}>{results.length} result{results.length===1?'':'s'}</span>
                {restricted.length>0 && <span className="badge amber"><Icon name="lock" size={12} />{restricted.length} restricted</span>}

                    <button className="btn btn-amber btn-sm" onClick={()=>go('access',{ request:{ doc:d.title, docId:d.doc_id } })}><Icon name="unlock" size={15} />Request access</button>
                  </div>
                  <div className="row" style={{ gap:6, marginTop:10, color:'var(--ink-400)', fontSize:11.5 }}><Icon name="shield" size={13} /><span>Preview redacted server-side (first words only) — full content is never delivered.</span></div>
                </div>
              </div>
            ))}

            {results.length===0 && restricted.length===0 && <div className="panel" style={{ padding:32, textAlign:'center' }}><Hint icon="info">No matches. Try different keywords, or upload a document.</Hint></div>}
          </>}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   LIBRARY (real: GET /api/documents, /api/groups, share)
   ============================================================ */
function ScreenLibrary({ go, me }) {
  const toast = useToast();
  const [docs, setDocs] = useState(null);
  const [groups, setGroups] = useState([]);
  const [folders, setFolders] = useState([]);
  const [view, setView] = useState('list');
  const [filter, setFilter] = useState('all');   // 'all' | 'mine' | 'dept:<name>' | 'folder:<id>'
  const [tag, setTag] = useState(null);
  const [share, setShare] = useState(null);       // doc being shared

  const load = async () => {
    try {
      const [d,g,f] = await Promise.all([api('/documents'), api('/groups'), api('/folders').catch(()=>[])]);
      setDocs(d); setGroups(g); setFolders(f);
    } catch(e){ toast('Load failed: '+e.message, {danger:true}); setDocs([]); }
  };
  useEffect(()=>{ load(); }, []);

  if(docs===null) return <div className="content-pad"><Spinner label="Loading your library…" /></div>;

  const inFilter = d => filter==='all' ? true
    : filter==='mine' ? d.owner_id===me.id
    : filter.startsWith('folder:') ? d.folder_id===filter.slice(7)
    : filter.startsWith('dept:') ? (d.shared_with||'').split(',').map(s=>s.trim()).includes(filter.slice(5))
    : true;
  const shown = docs.filter(d=>inFilter(d) && (!tag || (d.tags||[]).includes(tag)));
  const allTags = [...new Set(docs.flatMap(d=>d.tags||[]))].sort();
  const filterLabel = filter==='all'?'All accessible':filter==='mine'?'Owned by me'
    : filter.startsWith('folder:') ? ((folders.find(f=>f.id===filter.slice(7))||{}).name || 'Folder')
    : filter.slice(5);

  return (
    <div className="content-pad fade-up">
      <div className="spread" style={{ marginBottom:22 }}>
        <div>

          <p className="muted" style={{ margin:'6px 0 0', fontSize:15 }}>You only see documents you own, that are shared with your groups, or (as admin) everything.</p>
        </div>
        <button className="btn btn-primary" onClick={()=>go('upload')}><Icon name="upload" size={17} />Upload document</button>

            <div className="lbl" style={{ padding:'4px 8px 8px' }}>Access scope</div>
            <div className="col" style={{ gap:1 }}>
              <FilterRow icon="library" label="All accessible" on={filter==='all'} count={docs.length} onClick={()=>setFilter('all')} />
              <FilterRow icon="user" label="Owned by me" on={filter==='mine'} count={docs.filter(d=>d.owner_id===me.id).length} onClick={()=>setFilter('mine')} />
            </div>
            <div className="lbl" style={{ padding:'12px 8px 8px' }}>Folders</div>
            <div className="col" style={{ gap:1 }}>
              {folders.length===0 && <span className="dim" style={{ fontSize:12.5, padding:'4px 9px' }}>No folders visible</span>}
              {folders.map(f=>(
                <FilterRow key={f.id} icon="folder" label={f.name} on={filter==='folder:'+f.id} count={f.count} onClick={()=>setFilter('folder:'+f.id)} />
              ))}
            </div>
            <div className="lbl" style={{ padding:'12px 8px 8px' }}>Shared with department</div>
            <div className="col" style={{ gap:1 }}>
              {groups.map(g=>{
                const c = docs.filter(d=>(d.shared_with||'').split(',').map(s=>s.trim()).includes(g.name)).length;
                return <FilterRow key={g.id} icon="users" label={g.name} on={filter==='dept:'+g.name} count={c} onClick={()=>setFilter('dept:'+g.name)} />;
              })}
            </div>
          </div>
          {allTags.length>0 && <div className="panel" style={{ padding:14 }}>
            <div className="lbl" style={{ marginBottom:10 }}>Filter by tag</div>
            <div className="row wrap" style={{ gap:6 }}>
              {allTags.map(t=>(
                <button key={t} onClick={()=>setTag(tag===t?null:t)} className={'badge'+(tag===t?' solid-blue':'')} style={{ cursor:'pointer', border:tag===t?'none':'1px solid var(--line-200)' }}><Icon name="tag" size={11} />{t}</button>
              ))}
            </div>
          </div>}
          <div className="card card-pad" style={{ background:'var(--surface-2)' }}>
            <Hint icon="shield">Folders are ABAC-governed — you only see folders your departments permit. New uploads are owner-only until shared.</Hint>
          </div>
        </aside>

        <div className="col" style={{ gap:16 }}>
          <div className="spread">
            <div className="row" style={{ gap:10 }}>
              <Icon name="folder" size={18} style={{ color:'var(--blue-600)' }} />
              <span className="h3">{filterLabel}</span>
              <span className="badge">{shown.length} document{shown.length===1?'':'s'}</span>
              {tag && <span className="badge blue"><Icon name="tag" size={11} />{tag}<button onClick={()=>setTag(null)} style={{ border:'none', background:'none', padding:0, marginLeft:2, display:'flex' }}><Icon name="x" size={12} /></button></span>}
            </div>
            <div className="seg">
              <button className={view==='list'?'on':''} onClick={()=>setView('list')}><Icon name="list" size={15} /></button>
              <button className={view==='grid'?'on':''} onClick={()=>setView('grid')}><Icon name="grid" size={15} /></button>
            </div>
          </div>

          {shown.length===0 && <div className="panel" style={{ padding:40, textAlign:'center' }}><Hint icon="info">No documents here yet. Upload one, or switch scope.</Hint></div>}

          {shown.length>0 && view==='list' ? (
            <div className="panel" style={{ overflow:'hidden' }}>
              <table className="tbl">
                <thead><tr><th>Document</th><th>Access</th><th>Owner</th><th>Pages</th><th>Updated</th><th></th></tr></thead>
                <tbody>
                  {shown.map(d=>(
                    <tr key={d.id} style={{ cursor:'pointer' }} onClick={()=>go('document',{ id:d.id })}>
                      <td>
                        <div className="row" style={{ gap:11 }}>
                          <FileGlyph type={d.file_type} size={32} />
                          <div className="col" style={{ lineHeight:1.3 }}>
                            <span style={{ fontWeight:600, color:'var(--ink-900)', fontSize:14 }}>{d.title}</span>
                            <span className="dim" style={{ fontSize:12 }}>{d.file_type.toUpperCase()} · {d.pages} page{d.pages===1?'':'s'}</span>
                          </div>
                        </div>
                      </td>
                      <td onClick={e=>e.stopPropagation()}><AccessChips d={d} me={me} /></td>
                      <td><div className="row" style={{ gap:7 }}><Avatar name={d.owner_name} size={24} /><span style={{ fontSize:13 }}>{d.owner_name}</span></div></td>

                          <button className="icon-btn" style={{ width:30, height:30 }} title="Chat" onClick={()=>go('chat',{ scope:[{doc_id:d.id, title:d.title}] })}><Icon name="chat" size={15} /></button>
                          {(d.owner_id===me.id||me.is_admin) && <button className="icon-btn" style={{ width:30, height:30 }} title="Share" onClick={()=>setShare(d)}><Icon name="users" size={15} /></button>}
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          ) : shown.length>0 && (
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(250px, 1fr))', gap:14 }}>
              {shown.map(d=>(
                <div key={d.id} className="card card-hover card-pad" style={{ cursor:'pointer' }} onClick={()=>go('document',{ id:d.id })}>
                  <div className="spread" style={{ marginBottom:14 }}><FileGlyph type={d.file_type} size={40} /><span className="badge"><Icon name="file" size={11} />{d.pages}p</span></div>

                  </div>

              ))}
            </div>
          )}
        </div>
      </div>

      {share && <ShareModal d={share} groups={groups} onClose={()=>setShare(null)} onSaved={()=>{ setShare(null); load(); toast('Access updated'); }} />}
    </div>
  );

function FilterRow({ icon, label, on, count, onClick }) {
  return (
    <button className={'nav-item'+(on?' active':'')} style={{ padding:'7px 9px' }} onClick={onClick}>
      <Icon name={icon} size={17} /><span className="grow" style={{ fontSize:14 }}>{label}</span><span className="count">{count}</span>
    </button>
  );
}
function ShareModal({ d, groups, onClose, onSaved }) {
  const toast = useToast();
  const cur = new Set((d.shared_with||'').split(',').map(s=>s.trim()).filter(Boolean));
  const [sel, setSel] = useState(()=> new Set(groups.filter(g=>cur.has(g.name)).map(g=>g.id)));
  const toggle = id => setSel(s=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
  const save = async () => {
    try { await api(`/documents/${d.id}/share`,{method:'POST',body:JSON.stringify({group_ids:[...sel]})}); onSaved(); }
    catch(e){ toast('Share failed: '+e.message, {danger:true}); }
  };
  return (
    <Modal onClose={onClose} width={520}>
      <div className="modal-head">
        <div className="row" style={{ gap:11 }}>
          <div style={{ width:38, height:38, borderRadius:10, background:'var(--blue-50)', display:'grid', placeItems:'center' }}><Icon name="users" size={19} style={{ color:'var(--blue-600)' }} /></div>
          <div><div className="h3">Share access</div><div className="dim" style={{ fontSize:12.5 }}>{d.title}</div></div>
        </div>
      </div>
      <div className="modal-body">
        <p className="dim" style={{ margin:'0 0 14px', fontSize:13 }}>Grant access to whole groups. Members of a selected group can search, read, download, and chat with this document.</p>
        <div className="col" style={{ gap:8 }}>
          {groups.map(g=>{
            const on = sel.has(g.id);
            return (
              <button key={g.id} onClick={()=>toggle(g.id)} className="row" style={{ gap:11, padding:'10px 12px', borderRadius:'var(--r-sm)', border:'1px solid '+(on?'var(--blue-500)':'var(--line-200)'), background:on?'var(--blue-50)':'#fff', cursor:'pointer', textAlign:'left', width:'100%' }}>
                <span style={{ width:18, height:18, borderRadius:5, border:'1.5px solid '+(on?'var(--blue-600)':'var(--line-200)'), background:on?'var(--blue-600)':'#fff', display:'grid', placeItems:'center', flex:'0 0 auto' }}>{on && <Icon name="check" size={12} style={{ color:'#fff' }} strokeWidth={3} />}</span>
                <Icon name="users" size={16} style={{ color:on?'var(--blue-600)':'var(--ink-400)' }} />
                <span className="grow" style={{ fontSize:14, fontWeight:on?600:500, color:on?'var(--blue-700)':'var(--ink-700)' }}>{g.name}</span>
              </button>
            );
          })}
        </div>
      </div>
      <div className="modal-foot">
        <button className="btn btn-quiet" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" onClick={save}><Icon name="check" size={16} />Save access</button>
      </div>
    </Modal>
  );
}

                <span className="badge outline mono">v{d.current_version||1}</span>

    </div>
  );
}
function VersionUploader({ docId, onDone }) {
  const toast = useToast(); const ref = useRef(); const [busy, setBusy] = useState(false);
  const up = async (f) => { if(!f) return; setBusy(true);

function EditAccessModal({ d, vocab, folders, onClose, onSaved }) {

      await api(`/documents/${d.id}`,{method:'PATCH',body:JSON.stringify({

/* ============================================================
   CONVERSATIONS — multi-doc RAG with [n] citations (real)
   ============================================================ */
/* Renders a document's extracted chunks as readable text and highlights the cited chunk by id
   (exact, no fuzzy matching). Reused by the chat source viewer and the doc-detail preview. */
function ChunkDocView({ docId, chunkId }) {
  const [data, setData] = useState(null);
  const refs = useRef({});
  useEffect(()=>{ setData(null); api('/documents/'+docId+'/chunks').then(setData).catch(()=>setData({doc:null,chunks:[]})); }, [docId]);
  useEffect(()=>{
    if(data && chunkId!=null && refs.current[chunkId]){
      refs.current[chunkId].scrollIntoView({ block:'center', behavior:'smooth' });
      if(refs.current[chunkId].animate) refs.current[chunkId].animate([{background:'#FBEBCF'},{background:'var(--amber-50)'}], {duration:700});
    }
  }, [data, chunkId]);
  if(!data) return <Spinner label="Loading document…" />;
  if(!data.chunks || !data.chunks.length) return <div style={{ padding:8 }}><Hint icon="info">No extracted text is available for this document.</Hint></div>;
  const isPdf = data.doc && data.doc.file_type==='pdf';
  const dangling = chunkId!=null && !data.chunks.some(c=>c.id===chunkId);
  const renderContent = (txt) => (txt||'').split('\n').map((ln,i)=>{
    if(ln.startsWith('## ')) return <div key={i} style={{ fontWeight:600, color:'var(--ink-900)', margin:'6px 0 2px' }}>{ln.slice(3)}</div>;
    if(!ln.trim()) return <div key={i} style={{ height:6 }} />;
    return <div key={i}>{ln}</div>;
  });
  return (
    <div className="col" style={{ gap:2 }}>
      {dangling && <div style={{ marginBottom:8 }}><Hint icon="info">The cited passage is from an earlier version; showing the current document text.</Hint></div>}
      {data.chunks.map(ch=>{ const on = ch.id===chunkId; return (
        <div key={ch.id} ref={el=>refs.current[ch.id]=el}
          style={{ padding:on?'10px 12px':'2px 12px', borderRadius:8, fontSize:13.5, lineHeight:1.6, color:'var(--ink-700)',
            background:on?'var(--amber-50)':'transparent', borderLeft:'3px solid '+(on?'var(--amber-600)':'transparent'), transition:'background .2s' }}>
          {on && <div style={{ marginBottom:6 }}><span className="badge amber" style={{ fontSize:10.5 }}><Icon name="quote" size={10} />Cited passage{isPdf?` · p.${ch.page_no}`:''}</span></div>}
          {renderContent(ch.content)}
        </div>
      ); })}
    </div>
  );
}
function RichText({ text, cites, active, onCite, onOpen }) {
  const paras = (text||'').split('\n\n');
  return (
    <>
      {paras.map((p,pi)=>{
        const tokens = p.split(/(\[\d+\]|\*\*[^*]+\*\*)/g).filter(Boolean);
        return (
          <p key={pi} style={{ margin:'0 0 12px', lineHeight:1.62, color:'var(--ink-700)', fontSize:14.5 }}>
            {tokens.map((t,ti)=>{
              const cm = t.match(/^\[(\d+)\]$/);
              if(cm){ const n=+cm[1]; const c=(cites||[]).find(c=>c.n===n); if(!c) return t;
                return <button key={ti} onClick={()=>{ onCite(n); onOpen && onOpen(c); }} onMouseEnter={()=>onCite(n,true)} className="cite-chip" data-on={active===n} title={'Open source: '+c.title+' · p.'+c.page}>{n}</button>; }
              if(t.startsWith('**')) return <strong key={ti} style={{ color:'var(--ink-900)', fontWeight:600 }}>{t.slice(2,-2)}</strong>;
              return <span key={ti}>{t}</span>;
            })}
          </p>
        );
      })}
    </>
  );
}
function ScreenChat({ go, me, persona, route, chat, setChat }) {

  const query = (route.params && route.params.query) || chat.query || '';

  const [turns, setTurns] = useState(chat.turns || []);
  const [input, setInput] = useState('');
  const [thinking, setThinking] = useState(false);
  const [active, setActive] = useState(null);
  const threadRef = useRef(); const refRefs = useRef({});

  // Persist conversation state across navigation
  useEffect(()=>{ setChat({ scope, query, convId, turns }); }, [convId, turns]);
  useEffect(()=>{ if(threadRef.current) threadRef.current.scrollTop = threadRef.current.scrollHeight; }, [turns, thinking]);

  const lastAi = [...turns].reverse().find(t=>t.role==='assistant' && t.cites && t.cites.length);
  const panelCites = lastAi ? lastAi.cites : [];
  const [source, setSource] = useState(null);   // {docId, chunkId, title} -> source-viewer slide-over

  const openSource = (c) => { if(!c || !c.doc_id) return; setActive(c.n); setSource({ docId:c.doc_id, chunkId:c.chunk_id, title:c.title }); };

  const send = async () => {
    const msg = input.trim(); if(!msg || thinking) return;
    setInput(''); setTurns(t=>[...t,{role:'user',content:msg}]); setThinking(true);
    try {
      let cid = convId;
      if(!cid){ const r = await api('/conversations',{method:'POST',body:JSON.stringify({doc_ids:scope.map(s=>s.doc_id)})}); cid=r.conv_id; setConvId(cid); }
      const r = await api(`/conversations/${cid}/messages`,{method:'POST',body:JSON.stringify({content:msg})});
      setTurns(t=>[...t,{role:'assistant',content:r.answer,cites:r.cites}]);
    } catch(e){ setTurns(t=>[...t,{role:'assistant',content:'⚠️ '+e.message}]); }
    setThinking(false);
  };

  return (
    <div style={{ display:'grid', gridTemplateColumns:'minmax(0,1fr) 360px', height:'100%', overflow:'hidden', position:'relative' }}>
      <div className="col" style={{ height:'100%', overflow:'hidden', borderRight:'1px solid var(--line-200)' }}>
        <div style={{ padding:'16px 28px', borderBottom:'1px solid var(--line-200)', background:'var(--surface)' }}>
          <div className="spread">
            <div className="row" style={{ gap:10 }}>
              <Icon name="sparkle" size={18} style={{ color:'var(--blue-600)' }} />
              <div><div style={{ fontWeight:600, color:'var(--ink-900)', fontSize:15 }}>Conversation</div><div className="dim" style={{ fontSize:12.5 }}>{query?`Grounded in your search: "${query}"`:'Grounded in your accessible documents'}</div></div>
            </div>
            <button className="btn btn-ghost btn-sm" onClick={()=>{ setChat({}); go('search'); }}><Icon name="refresh" size={15} />New scope</button>
          </div>
          <div className="row wrap" style={{ gap:8, marginTop:14 }}>
            <span className="lbl" style={{ marginRight:2 }}>In context</span>
            {scope.length ? scope.map(d=>(
              <span key={d.doc_id} className="badge blue" style={{ paddingLeft:7 }}><Icon name="doc" size={11} />{d.title.length>30?d.title.slice(0,30)+'…':d.title}</span>
            )) : <span className="badge"><Icon name="library" size={11} />All accessible documents</span>}
          </div>
        </div>

        <div ref={threadRef} className="grow" style={{ overflowY:'auto', padding:'24px 28px 12px' }}>
          <div style={{ maxWidth:720, margin:'0 auto' }}>
            {turns.length===0 && !thinking && (
              <div className="col" style={{ alignItems:'center', gap:10, padding:'48px 0', textAlign:'center' }}>
                <div style={{ width:48, height:48, borderRadius:12, background:'linear-gradient(135deg, var(--blue-600), var(--navy-700))', display:'grid', placeItems:'center' }}><Icon name="sparkle" size={24} style={{ color:'#fff' }} /></div>
                <div className="h3">Ask across your documents</div>
                <p className="dim" style={{ maxWidth:380, fontSize:13.5, margin:0 }}>Every answer is grounded in retrieved excerpts and cites its sources. Only content you can access is ever used.</p>
              </div>

/* ============================================================
   ACCESS REQUESTS — Demo (no backend workflow)
   ============================================================ */
function ScreenAccess({ go, persona, route }) {
  const toast = useToast();
  const req = route.params && route.params.request;
  const [data, setData] = useState(null);   // {incoming, mine}
  const [tab, setTab] = useState(persona.isApprover || persona.isAdmin ? 'incoming' : 'mine');
  const [deny, setDeny] = useState(null);
  const load = () => api('/access-requests').then(setData).catch(e=>{ toast('Load failed: '+e.message,{danger:true}); setData({incoming:[],mine:[]}); });
  useEffect(()=>{ if(!req) load(); }, [req]);

  if(req) return <RequestForm req={req} persona={persona}
    onClose={()=>go('search')}
    onSubmit={async (justification)=>{
      try { await api('/access-requests',{method:'POST',body:JSON.stringify({doc_id:req.docId, justification})});
        toast('Access request sent to the approver · email dispatched', {icon:'mail'}); go('access'); }
      catch(e){ toast(e.message, {danger:true, icon:'xCircle'}); }
    }} />;

  const decide = async (id, decision, note) => {
    try { await api(`/access-requests/${id}/decide`,{method:'POST',body:JSON.stringify({decision, note})});
      setDeny(null);
      toast(decision==='approve'?'Access granted · requester notified':'Request denied · requester notified',
            {icon:decision==='approve'?'checkCircle':'xCircle', danger:decision!=='approve'});
      load();
    } catch(e){ toast(e.message, {danger:true}); }
  };

  if(data===null) return <div className="content-pad"><Spinner label="Loading access requests…" /></div>;
  const pending = data.incoming.filter(r=>r.status==='pending').length;
  const rows = tab==='incoming' ? data.incoming : data.mine;

  return (
    <div className="content-pad fade-up">
      <div className="spread" style={{ marginBottom:8 }}>
        <div><h1 className="h1">Access requests</h1><p className="muted" style={{ margin:'6px 0 0', fontSize:15 }}>Request-to-unlock workflow. Approving issues a time-limited, document-scoped grant.</p></div>
      </div>
      <div className="card card-pad" style={{ background:'var(--surface-2)', margin:'16px 0 22px', maxWidth:880 }}><Hint icon="key">Approve/deny links are HMAC-signed, single-use, and expire — approvers can act from email without logging in.</Hint></div>

      <div className="tabs" style={{ marginBottom:22 }}>
        {(persona.isApprover || persona.isAdmin) && <button className={'tab'+(tab==='incoming'?' on':'')} onClick={()=>setTab('incoming')}>Incoming{pending>0 && <span className="badge amber" style={{ marginLeft:7 }}>{pending} pending</span>}</button>}
        <button className={'tab'+(tab==='mine'?' on':'')} onClick={()=>setTab('mine')}>My requests</button>
      </div>

      <div className="col" style={{ gap:14, maxWidth:880 }}>
        {rows.length===0 && <div className="panel" style={{ padding:32, textAlign:'center' }}><Hint icon="info">{tab==='incoming'?'No incoming requests.':'You have no access requests.'}</Hint></div>}
        {rows.map(r=><RequestCard key={r.id} r={r} approver={tab==='incoming'} onDecide={d=>d==='deny'?setDeny(r):decide(r.id,'approve')} />)}
      </div>

      {deny && <DenyModal r={deny} onClose={()=>setDeny(null)} onConfirm={note=>decide(deny.id,'deny',note)} />}
    </div>
  );
}
function RequestCard({ r, approver, onDecide }) {
  const st = { pending:{cls:'amber',icon:'clock',label:'Pending'}, approved:{cls:'green',icon:'checkCircle',label:'Approved'}, denied:{cls:'red',icon:'xCircle',label:'Denied'} }[r.status] || {cls:'',icon:'clock',label:r.status};
  return (
    <div className="card" style={{ padding:20 }}>
      <div className="spread" style={{ alignItems:'flex-start', marginBottom:14 }}>
        <div className="row" style={{ gap:14, alignItems:'flex-start' }}>
          <div style={{ width:40, height:40, borderRadius:11, background:'var(--amber-50)', border:'1px solid var(--amber-100)', display:'grid', placeItems:'center', flex:'0 0 auto' }}><Icon name="lock" size={19} style={{ color:'var(--amber-600)' }} /></div>
          <div><span className="h3" style={{ display:'block' }}>{r.doc_title}</span><div className="row wrap" style={{ gap:9, marginTop:7 }}><span className="row dim" style={{ gap:5, fontSize:12.5 }}><Icon name="clock" size={13} />{relTime(r.created_at)}</span>{!approver && <><span className="dim">·</span><span className="dim" style={{ fontSize:12.5 }}>approver {r.approver_name}</span></>}</div></div>
        </div>
        <span className={'badge '+st.cls}><Icon name={st.icon} size={12} />{st.label}</span>
      </div>
      <div className="card" style={{ padding:14, background:'var(--surface-2)', marginBottom:approver && r.status==='pending'?16:0 }}>
        <div className="row" style={{ gap:9, marginBottom:r.justification?9:0 }}><Avatar name={r.requester_name} size={28} /><div className="col" style={{ lineHeight:1.3 }}><span style={{ fontSize:13.5, fontWeight:600, color:'var(--ink-900)' }}>{r.requester_name}</span><span className="dim" style={{ fontSize:12 }}>{r.requester_role||'Requester'}</span></div></div>
        {r.justification && <p style={{ margin:0, fontSize:13.5, color:'var(--ink-700)', lineHeight:1.55, fontStyle:'italic' }}>"{r.justification}"</p>}
      </div>
      {approver && r.status==='pending' && (
        <div className="spread"><Hint icon="shieldCheck">Approving issues a 30-day document-scoped grant</Hint>
          <div className="row" style={{ gap:10 }}><button className="btn btn-danger" onClick={()=>onDecide('deny')}><Icon name="x" size={16} />Deny</button><button className="btn btn-primary" onClick={()=>onDecide('approve')}><Icon name="check" size={16} />Approve</button></div>
        </div>
      )}
      {r.status!=='pending' && <div className="row" style={{ gap:8, marginTop:14, paddingTop:14, borderTop:'1px solid var(--line-100)' }}><Icon name={r.status==='approved'?'checkCircle':'xCircle'} size={16} style={{ color:r.status==='approved'?'var(--green-700)':'var(--red-600)' }} /><span style={{ fontSize:13, fontWeight:500, color:'var(--ink-700)' }}>{r.status==='approved'?'Approved · 30-day grant':'Denied'}{r.approver_note?' · '+r.approver_note:''}</span></div>}
    </div>
  );
}
function RequestForm({ req, persona, onClose, onSubmit }) {
  const [note, setNote] = useState(''); const [busy, setBusy] = useState(false);
  const submit = async () => { setBusy(true); await onSubmit(note); setBusy(false); };

      <div className="modal-body">
        <div className="card" style={{ padding:14, marginBottom:18, background:'var(--surface-2)' }}><div className="row" style={{ gap:12 }}><Icon name="lock" size={20} style={{ color:'var(--amber-600)' }} /><div className="grow"><div style={{ fontWeight:600, color:'var(--ink-900)', fontSize:14 }}>{req.doc}</div><div className="dim" style={{ fontSize:12.5 }}>Restricted — outside your access</div></div></div></div>
        <div className="lbl" style={{ marginBottom:10 }}>Pre-filled by the system</div>
        <div className="col" style={{ gap:8, marginBottom:18 }}>{[['Requester',persona.name],['Identity',persona.email||persona.role]].map(([k,v])=><div key={k} className="spread"><span className="dim" style={{ fontSize:13 }}>{k}</span><span style={{ fontSize:13, fontWeight:500, color:'var(--ink-900)' }}>{v}</span></div>)}</div>
        <div className="field"><label>Justification <span className="dim" style={{ fontWeight:400 }}>(optional, recommended)</span></label><textarea className="textarea" value={note} onChange={e=>setNote(e.target.value)} placeholder="Why do you need access to this document?" /></div>
      </div>
      <div className="modal-foot"><button className="btn btn-quiet" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={submit} disabled={busy}><Icon name="send" size={16} />Send request</button></div>

  );
}
function DenyModal({ r, onClose, onConfirm }) {
  const [note, setNote] = useState('');
  return (

      <div className="modal-head"><div className="h3">Deny access request</div></div>
      <div className="modal-body"><p className="muted" style={{ margin:'0 0 16px', fontSize:14 }}>Denying <b style={{ color:'var(--ink-900)' }}>{r.requester_name}</b>'s request for "{r.doc_title}".</p><div className="field"><label>Reason <span className="dim" style={{ fontWeight:400 }}>(optional)</span></label><textarea className="textarea" value={note} onChange={e=>setNote(e.target.value)} placeholder="e.g. Out of project scope." /></div></div>
      <div className="modal-foot"><button className="btn btn-quiet" onClick={onClose}>Cancel</button><button className="btn btn-danger" onClick={()=>onConfirm(note)} style={{ background:'var(--red-600)', color:'#fff', borderColor:'var(--red-600)' }}><Icon name="x" size={16} />Confirm denial</button></div>
    </Modal>

}

      </div>
      <div className="col" style={{ gap:14 }}>
        <div className="field"><label style={{ fontSize:12 }}>Departments</label><div className="row wrap" style={{ gap:6 }}>{vocab.departments.map(g=><Chip key={g.id} on={departments.has(g.id)} onClick={()=>tog(setDepartments,g.id)}>{g.name}</Chip>)}</div></div>
        <div className="field"><label style={{ fontSize:12 }}>Clearance</label><div className="row wrap" style={{ gap:7 }}>{vocab.clearances.map(c=><button key={c} onClick={()=>setClearance(c)} style={{ border:'none', background:'none', padding:0, cursor:'pointer', opacity:clearance===c?1:.5, outline:clearance===c?'2px solid var(--blue-500)':'none', borderRadius:999 }}><Clearance level={c} size="sm" /></button>)}</div></div>
        <div className="field"><label style={{ fontSize:12 }}>User type</label><div className="row wrap" style={{ gap:6 }}>{vocab.user_types.map(t=><Chip key={t} on={userType===t} onClick={()=>setUserType(t)}>{t}</Chip>)}</div></div>
        <div className="field"><label style={{ fontSize:12 }}>Projects</label><div className="row wrap" style={{ gap:6 }}>{vocab.projects.map(p=><Chip key={p} on={projects.has(p)} onClick={()=>tog(setProjects,p)}>{p}</Chip>)}</div></div>
        <label className="row" style={{ gap:9, cursor:'pointer' }}><input type="checkbox" checked={active} onChange={e=>setActive(e.target.checked)} /><span style={{ fontSize:13.5 }}>Active</span></label>
      </div>
      <button className="btn btn-primary btn-block" style={{ marginTop:16 }} onClick={()=>onSave({ departments:[...departments], clearance, user_type:userType, projects:[...projects], is_active:active })}><Icon name="check" size={16} />Save attributes</button>
    </div>
  );
}
const AUDIT_META = {
  'document.upload':{cat:'Document',icon:'upload'}, 'document.view':{cat:'Document',icon:'eye'},
  'document.download':{cat:'Document',icon:'download'}, 'document.share':{cat:'Access',icon:'users'},
  'search.query':{cat:'Search',icon:'search'}, 'ai.turn':{cat:'AI',icon:'chat'},
  'ai.session_start':{cat:'AI',icon:'sparkle'},
};
function ScreenAudit({ namesById }) {
  const toast = useToast();
  const [rows, setRows] = useState(null);
  const [cat, setCat] = useState('All');
  useEffect(()=>{ api('/audit').then(setRows).catch(e=>{ toast('Audit load failed: '+e.message,{danger:true}); setRows([]); }); }, []);
  if(rows===null) return <div className="content-pad"><Spinner label="Loading audit log…" /></div>;
  const enriched = rows.map(r=>{ const m=AUDIT_META[r.event]||{cat:'System',icon:'info'}; let detail=''; try{ detail=JSON.stringify(JSON.parse(r.detail)); }catch{ detail=r.detail||''; } return {...r, ...m, detail}; });
  const cats = ['All', ...Array.from(new Set(enriched.map(r=>r.cat)))];
  const shown = enriched.filter(r=>cat==='All'||r.cat===cat);
  return (
    <div className="content-pad fade-up">
      <div className="spread" style={{ marginBottom:22 }}>
        <div><h1 className="h1">Audit log</h1><p className="muted" style={{ margin:'6px 0 0', fontSize:15 }}>Append-only record of uploads, shares, searches, approvals, and AI turns.</p></div>
        <button className="btn btn-ghost" onClick={async ()=>{
          try { const r = await fetch('/api/audit.csv',{headers:authHeader()}); const url=URL.createObjectURL(await r.blob());
            const a=document.createElement('a'); a.href=url; a.download='aibox_audit.csv'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),60000);
            toast('Audit exported'); } catch(e){ toast('Export failed: '+e.message,{danger:true}); }
        }}><Icon name="download" size={16} />Export CSV</button>
      </div>
      <div className="row wrap" style={{ gap:7, marginBottom:18 }}>
        {cats.map(c=><button key={c} onClick={()=>setCat(c)} className={'badge'+(cat===c?' solid-blue':'')} style={{ cursor:'pointer', border:cat===c?'none':'1px solid var(--line-200)', padding:'5px 12px' }}>{c}</button>)}
        <div className="grow" /><Hint icon="database">{rows.length} recent events</Hint>
      </div>
      <div className="panel" style={{ overflow:'hidden' }}>
        <table className="tbl">
          <thead><tr><th>Event</th><th>Category</th><th>Actor</th><th>Detail</th><th>Time</th></tr></thead>
          <tbody>{shown.map((e,i)=>(
            <tr key={i}>
              <td><div className="row" style={{ gap:10 }}><span style={{ width:30, height:30, borderRadius:8, background:'var(--surface-2)', border:'1px solid var(--line-200)', display:'grid', placeItems:'center', flex:'0 0 auto' }}><Icon name={e.icon} size={15} style={{ color:'var(--ink-500)' }} /></span><span style={{ fontWeight:500, color:'var(--ink-900)', fontSize:13.5 }}>{e.event}</span></div></td>
              <td><span className="badge outline" style={{ fontSize:11 }}>{e.cat}</span></td>
              <td><div className="row" style={{ gap:7 }}><Avatar name={namesById[e.user_id]||e.user_id} size={22} /><span style={{ fontSize:13 }}>{namesById[e.user_id]||e.user_id}</span></div></td>
              <td className="mono" style={{ fontSize:12, color:'var(--ink-500)', maxWidth:320, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{e.detail}</td>
              <td className="dim" style={{ fontSize:12.5, whiteSpace:'nowrap' }}>{new Date(e.ts*1000).toLocaleString()}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}

/* ============================================================
   APP shell + router
   ============================================================ */
function App({ me, onLogout, onQuickLogin }) {
  const [personas, setPersonas] = useState([]);     // seeded demo users (for quick-switch)
  const [route, setRoute] = useState({ name:'search', params:{} });
  const [chat, setChat] = useState({});             // persisted conversation state
  const go = (name, params={}) => setRoute({ name, params });
  useEffect(()=>{ api('/personas').then(setPersonas).catch(()=>{}); }, []);

  const namesById = {}; personas.forEach(p=>namesById[p.id]=p.name);
  const persona = { id:me.id, name:me.name, role:me.role, email:me.email, isAdmin:!!me.is_admin,
    canUpload: me.is_admin || me.user_type==='employee', isApprover: me.is_admin || me.user_type==='employee',
    attrs:{ department: me.departments||[], clearance: me.clearance, userType: me.user_type, projects: me.projects||[] },
    groups: me.departments||[] };

  const NAV = [
    { id:'search', icon:'search', label:'Search' },
    { id:'library', icon:'library', label:'Library' },
    { id:'chat', icon:'chat', label:'Conversations' },
    { id:'upload', icon:'upload', label:'Upload', show:persona.canUpload },
  ];
  const WORK = [{ id:'access', icon:'unlock', label:'Access requests' }];
  const ADMIN = [{ id:'admin', icon:'users', label:'Users & attributes' }, { id:'audit', icon:'shield', label:'Audit log' }];
  const titles = { search:'Search', library:'Library', chat:'Conversations', upload:'Upload document', document:'Document', access:'Access requests', admin:'Users & attributes', audit:'Audit log' };

  let Screen;
  switch(route.name){
    case 'search': Screen = <ScreenSearch go={go} me={me} />; break;
    case 'library': Screen = <ScreenLibrary go={go} me={me} />; break;
    case 'document': Screen = <ScreenDocument go={go} me={me} route={route} />; break;
    case 'upload': Screen = <ScreenUpload go={go} me={me} />; break;
    case 'chat': Screen = <ScreenChat go={go} me={me} persona={persona} route={route} chat={chat} setChat={setChat} />; break;
    case 'access': Screen = <ScreenAccess go={go} persona={persona} route={route} />; break;
    case 'admin': Screen = <ScreenAdmin go={go} />; break;
    case 'audit': Screen = <ScreenAudit namesById={namesById} />; break;
    default: Screen = <ScreenSearch go={go} me={me} />;
  }
  const fullBleed = route.name==='chat';

  const NavBtn = (item) => (item.show===undefined || item.show) && (
    <button key={item.id} className={'nav-item'+(route.name===item.id?' active':'')} onClick={()=>go(item.id)}>
      <Icon name={item.icon} size={19} /><span className="grow">{item.label}</span>
      {item.count!=null && <span className="count">{item.count}</span>}
    </button>
  );

  return (
    <div className="app">
      <nav className="rail">
        <div className="rail-logo"><LogoMark size={34} /><span className="wordmark">AI<b>Box</b></span></div>
        <div className="rail-nav">
          {NAV.map(NavBtn)}
          <div className="nav-section"><span className="lbl">Workflow</span></div>
          {WORK.map(NavBtn)}
          {persona.isAdmin && <><div className="nav-section"><span className="lbl">Administration</span></div>{ADMIN.map(NavBtn)}</>}
        </div>
        <div className="rail-foot">
          <div className="card" style={{ padding:12, background:'var(--surface-2)', border:'1px solid var(--line-200)' }}>
            <div className="row" style={{ gap:8 }}><Icon name="database" size={15} style={{ color:'var(--blue-600)' }} /><span style={{ fontSize:12, fontWeight:600, color:'var(--ink-900)' }}>Self-hosted</span><span className="badge green" style={{ marginLeft:'auto', fontSize:10.5 }}>Single-tenant</span></div>
          </div>
        </div>
      </nav>

      <div className="main">
        <header className="topbar">
          <div className="row" style={{ gap:11, minWidth:0 }}>
            <Icon name={(NAV.concat(WORK,ADMIN).find(n=>n.id===route.name)||{}).icon||'doc'} size={20} style={{ color:'var(--ink-400)' }} />
            <span style={{ fontWeight:600, fontSize:16, color:'var(--ink-900)' }}>{titles[route.name]||'AI Box'}</span>
          </div>
          <div className="grow" />
          {persona.canUpload && route.name!=='upload' && <button className="btn btn-ghost btn-sm" onClick={()=>go('upload')}><Icon name="plus" size={16} />Upload</button>}
          <Menu align="right" width={320} trigger={(open)=>(
            <button className="persona-card" style={{ borderColor:open?'var(--blue-500)':'var(--line-200)' }}>
              <Avatar name={persona.name} size={30} />
              <div className="col" style={{ alignItems:'flex-start', lineHeight:1.25, whiteSpace:'nowrap' }}><span style={{ fontSize:13.5, fontWeight:600, color:'var(--ink-900)' }}>{persona.name}</span><span className="dim" style={{ fontSize:11.5 }}>{persona.role}</span></div>
              <Icon name="chevDown" size={16} style={{ color:'var(--ink-400)' }} />
            </button>
          )}>
            {(close)=>(
              <div>
                <div className="row" style={{ gap:10, padding:'8px 10px 8px' }}>
                  <Avatar name={persona.name} size={36} />
                  <div className="col" style={{ alignItems:'flex-start', lineHeight:1.3, minWidth:0 }}>
                    <span style={{ fontSize:14, fontWeight:600, color:'var(--ink-900)' }}>{persona.name}</span>
                    <span className="dim" style={{ fontSize:12 }}>{me.email}</span>
                  </div>
                </div>
                <div style={{ padding:'0 10px 10px' }}>
                  <div className="lbl" style={{ marginBottom:7 }}>Access attributes (ABAC)</div>
                  <div className="row wrap" style={{ gap:5 }}>
                    {persona.attrs.department.map(d=><span key={d} className="badge blue"><Icon name="users" size={11} />{d}</span>)}
                    <Clearance level={persona.attrs.clearance} size="sm" />
                    <Attr k="type" v={persona.attrs.userType} />
                    {persona.isAdmin && <span className="badge green">admin · sees all</span>}
                  </div>
                </div>
                <div className="hr" style={{ margin:'2px 0 6px' }} />
                <button className="nav-item" onClick={()=>{ close(); onLogout(); }} style={{ padding:'8px 10px' }}><Icon name="login" size={17} /><span style={{ fontSize:14 }}>Log out</span></button>
                <div className="hr" style={{ margin:'6px 0' }} />
                <div className="lbl" style={{ padding:'4px 10px 8px' }}>Switch user (demo quick-login)</div>
                {personas.filter(p=>p.id!==me.id).map(p=>(
                  <button key={p.id} className="nav-item" onClick={()=>{ close(); onQuickLogin(p.username); }} style={{ padding:8, gap:11 }}>
                    <Avatar name={p.name} size={32} />
                    <div className="col" style={{ alignItems:'flex-start', lineHeight:1.25 }}><span style={{ fontSize:13.5, fontWeight:600, color:'var(--ink-900)' }}>{p.name}</span><span className="dim" style={{ fontSize:11.5 }}>{p.role}{p.is_admin?' · admin':''} · {p.clearance}</span></div>
                  </button>
                ))}
              </div>
            )}
          </Menu>
        </header>

        {fullBleed ? <div key={route.name} className="grow" style={{ overflow:'hidden' }}>{Screen}</div> : <div key={route.name} className="content">{Screen}</div>}
      </div>
    </div>
  );
}

/* ============================================================
   Login (username/password + demo quick-login) + auth root
   ============================================================ */
function Login({ onLogin }) {
  const [list, setList] = useState([]);
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [err, setErr] = useState(''); const [busy, setBusy] = useState(false);
  useEffect(()=>{ fetch('/api/personas').then(r=>r.json()).then(setList).catch(()=>{}); }, []);
  const submit = async (un, pw) => {
    if(!un || !pw){ setErr('Enter a username and password'); return; }
    setErr(''); setBusy(true);
    try {
      const r = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username: un, password: pw }) });
      const d = await r.json().catch(()=>({}));
      if(!r.ok){ setErr(d.detail || 'Login failed'); setBusy(false); return; }
      setToken(d.token); onLogin(d.user);
    } catch(e){ setErr(e.message); setBusy(false); }
  };
  return (
    <div style={{ minHeight:'100vh', display:'grid', placeItems:'center', padding:24 }}>
      <div className="panel fade-up" style={{ width:'100%', maxWidth:420, padding:32, boxShadow:'var(--sh-lg)' }}>
        <div className="row" style={{ gap:12, marginBottom:6 }}>
          <LogoMark size={40} /><span className="wordmark" style={{ fontFamily:'var(--font-display)', fontWeight:600, fontSize:24, color:'var(--navy-900)' }}>AI<b style={{ color:'var(--blue-600)' }}>Box</b></span>
        </div>
        <p className="muted" style={{ margin:'0 0 22px', fontSize:14 }}>Sign in to your access-governed knowledge base.</p>
        <form onSubmit={e=>{ e.preventDefault(); submit(username, password); }}>
          <div className="field" style={{ marginBottom:14 }}><label>Username</label>
            <input className="input" value={username} autoFocus onChange={e=>setUsername(e.target.value)} placeholder="alice / bob / carol" /></div>
          <div className="field" style={{ marginBottom:18 }}><label>Password</label>
            <input className="input" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="password" /></div>
          {err && <div className="badge red" style={{ marginBottom:14 }}><Icon name="xCircle" size={12} />{err}</div>}
          <button type="submit" className="btn btn-primary btn-lg btn-block" disabled={busy}><Icon name="login" size={17} />{busy?'Signing in…':'Sign in'}</button>
        </form>
        {list.length>0 && <>
          <div className="row" style={{ gap:10, margin:'20px 0 12px' }}><div className="hr grow" /><span className="dim" style={{ fontSize:12 }}>demo accounts</span><div className="hr grow" /></div>
          <div className="col" style={{ gap:8 }}>
            {list.map(p=>(
              <button key={p.id} className="persona-card" style={{ width:'100%' }} onClick={()=>{ setUsername(p.username); setPassword(p.username); submit(p.username, p.username); }}>
                <Avatar name={p.name} size={30} />
                <div className="col grow" style={{ alignItems:'flex-start', lineHeight:1.25 }}>
                  <span style={{ fontSize:13.5, fontWeight:600, color:'var(--ink-900)' }}>{p.name}</span>
                  <span className="dim" style={{ fontSize:11.5 }}>{p.role} · {p.clearance}{p.is_admin?' · admin':''}</span>
                </div>
                <Icon name="arrowRight" size={16} style={{ color:'var(--ink-400)' }} />
              </button>
            ))}
          </div>
          <p className="dim" style={{ fontSize:11.5, margin:'14px 0 0', textAlign:'center' }}>Demo passwords match the username.</p>
        </>}
      </div>
    </div>
  );
}

function Root() {
  const [me, setMe] = useState(undefined);   // undefined = loading, null = logged out
  useEffect(()=>{
    onAuthFail = () => setMe(null);
    if(TOKEN) api('/me').then(setMe).catch(()=>{ setToken(''); setMe(null); });
    else setMe(null);
  }, []);
  const quickLogin = async (username) => {
    try {
      const r = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username, password: username }) });
      if(r.ok){ const d = await r.json(); setToken(d.token); setMe(d.user); }
    } catch(e){}
  };
  const logout = () => { setToken(''); setMe(null); };
  if(me === undefined) return <div style={{ display:'grid', placeItems:'center', height:'100vh' }}><Spinner label="Starting AI Box…" /></div>;
  if(!me) return <Login onLogin={setMe} />;
  return <App key={me.id} me={me} onLogout={logout} onQuickLogin={quickLogin} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<ToastHost><Root /></ToastHost>);
</script>
