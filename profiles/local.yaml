# Local / dev profile: runs end-to-end with zero external services.
# SQLite + FTS5 + filesystem + pypdf + (Anthropic API or extractive fallback).
profile: local
adapters:
  llm: anthropic
  embedder: noop
  reranker: noop
  object_store: fs
  relational: sqlite
  retriever: fts5
  parser: pypdf
  guardrail: noop
  dlp: noop
  event_bus: inline
  telemetry: stdout
  identity: dev
  notifier: outbox
  orchestrator: simple
config:
  relational: { path: data/unlock.db }
  object_store: { root: data/files }
  notifier: { outbox: data/outbox }
  llm: { model: claude-sonnet-4-5 }
  identity: { }            # set UNLOCK_DEV_AUTH=1 to allow the X-User test header
secrets:
  provider: env            # ANTHROPIC_API_KEY (optional), UNLOCK_JWT_SECRET (optional)
