# On-prem / sovereign profile: open-source data plane, no cloud dependency.
# Postgres+pgvector + OpenSearch + MinIO + Tika + hosted Gemma/BGE inference, with
# Presidio DLP, NeMo+Llama Guard, OTel, OIDC, SMTP, and ADK orchestration.
# Secrets stay in env; YAML references them via *_env indirection (infra/settings.py).
profile: onprem
adapters:
  llm: gemma
  embedder: hosted
  reranker: bge
  object_store: minio
  relational: pgvector
  retriever: opensearch
  parser: tika
  guardrail: llamaguard
  dlp: presidio
  event_bus: knative
  telemetry: otel
  identity: oidc
  notifier: smtp
  orchestrator: adk
config:
  llm:
    base_url_env: GEMMA_BASE_URL          # OpenAI-compatible /v1/chat/completions (GemmaLLM(base_url=...))
    model: gemma-2-9b-it
    api_key_env: GEMMA_API_KEY
  embedder:
    endpoint_env: EMBED_ENDPOINT          # OpenAI-compatible /v1/embeddings
    model: bge-base-en-v1.5
    dim: 768
    api_key_env: EMBED_API_KEY
  reranker:
    endpoint_env: RERANK_ENDPOINT         # hosted bge-reranker (optional; passthrough if unset)
    model: bge-reranker-base
    api_key_env: RERANK_API_KEY
  object_store:
    endpoint_url_env: MINIO_ENDPOINT
    access_key_env: MINIO_ACCESS_KEY
    secret_key_env: MINIO_SECRET_KEY
    bucket: aibox
    region: us-east-1
  relational:
    dsn_env: PG_DSN                       # postgresql://user:pass@host:5432/aibox
  retriever:
    url_env: OPENSEARCH_URL
    index: aibox-chunks
    user_env: OPENSEARCH_USER
    password_env: OPENSEARCH_PASSWORD
    verify_certs: true
    rrf_k: 60
  parser:
    tika_url_env: TIKA_URL                # http://tika:9998 (optional; pypdf fallback if unset)
  guardrail:
    base_url_env: LLAMAGUARD_ENDPOINT     # LlamaGuardNemoGuardrail(base_url=...)
    config_path: configs/nemo-guardrails
  dlp:
    language: en
  event_bus:
    broker_url_env: KNATIVE_BROKER_URL
  telemetry:
    endpoint_env: OTEL_EXPORTER_OTLP_ENDPOINT
    service_name: gcp-unlock
  identity:
    issuer_env: OIDC_ISSUER
    audience_env: OIDC_AUDIENCE
    jwks_url_env: OIDC_JWKS_URL
  notifier:
    host_env: SMTP_HOST
    port: 587
    user_env: SMTP_USER
    password_env: SMTP_PASSWORD
    from_addr: no-reply@aibox.local
  orchestrator:
    model: gemma-2-9b-it
secrets:
  provider: env                           # PG_DSN, OPENSEARCH_URL, MINIO_*, GEMMA_ENDPOINT, etc.
